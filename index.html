<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оценка одноклассников</title>

<!-- ПИКСЕЛЬНЫЙ ШРИФТ -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #67d6c4;
    text-align: center;
    font-family: 'Press Start 2P', cursive;
}

/* экран */
.screen {
    margin-top: 60px;
}

/* заголовок */
.title {
    font-size: 28px;
    margin-bottom: 50px;
}

/* строки */
.inputBox {
    margin: 25px;
    font-size: 12px;
}

.inputBox span {
    display: inline-block;
    width: 200px;
    text-align: right;
    margin-right: 10px;
}

/* поля */
input {
    width: 260px;
    height: 40px;
    border: 4px solid black;
    background: #67d6c4;
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    text-align: center;
}

/* кнопка */
.mainBtn {
    margin-top: 40px;
    padding: 20px 60px;
    font-size: 14px;
    background: #3e9c72;
    border: 4px solid black;
    font-family: 'Press Start 2P', cursive;
    cursor: pointer;
}

/* hover */
.mainBtn:hover {
    background: #2e7c52;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<!-- РЕГИСТРАЦИЯ -->
<div id="auth" class="screen">
    <h1 class="title">REGISTRATION</h1>

    <div class="inputBox">
        <span>NAME:</span>
        <input id="name">
    </div>

    <div class="inputBox">
        <span>SURNAME:</span>
        <input id="surname">
    </div>

    <div class="inputBox">
        <span>NICKNAME:</span>
        <input id="nickname">
    </div>

    <div class="inputBox">
        <span>PASSWORD:</span>
        <input id="password" type="password">
    </div>

    <button class="mainBtn" onclick="register()">COMPLETE</button>
</div>

<!-- МЕНЮ -->
<div id="menu" class="screen hidden">
    <h1 class="title">ОЦЕНКА</h1>
    <button class="mainBtn" onclick="startQuiz()">START</button>
</div>

<!-- КВИЗ -->
<div id="quiz" class="screen hidden"></div>

<script>
let currentUser = "";
let answers = {};

let students = [
"Мирослав","Ассовская","Грико","Гуща","Никола","Аня Д.","Артём"
];

function show(id) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");

    document.getElementById(id).classList.remove("hidden");
}

/* РЕГИСТРАЦИЯ */
function register() {
    if (!window.auth) {
        alert("Firebase не загрузился");
        return;
    }

    const nickname = document.getElementById("nickname").value;
    const pass = document.getElementById("password").value;

    if (pass.length < 6) {
        alert("Пароль минимум 6 символов");
        return;
    }

    const email = nickname + "@test.com";

    createUserWithEmailAndPassword(window.auth, email, pass)
    .then(() => {
        alert("Аккаунт создан!");
        currentUser = nickname;
        show("menu");
    })
    .catch(e => alert(e.message));
}

/* КВИЗ */
function startQuiz() {
    const div = document.getElementById("quiz");
    div.innerHTML = "<h2>ОЦЕНИ</h2>";

    students.forEach((s, i) => {
        div.innerHTML += `
        <div>
            ${s}: 
            <input type="number" min="0" max="10" onchange="save(${i}, this.value)">
        </div>`;
    });

    div.innerHTML += `<br><button class="mainBtn" onclick="submit()">SEND</button>`;

    show("quiz");
}

function save(i, val) {
    answers[students[i]] = val;
}

function submit() {
    if (!window.db) {
        alert("Firebase не подключен");
        return;
    }

    push(ref(db, "results"), {
        user: currentUser,
        answers: answers
    });

    alert("Отправлено!");
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBcbMg9i3KZfWzNUBe5DHwR4lCH4ySC9q8",
    authDomain: "math-site-36482.firebaseapp.com",
    databaseURL: "https://math-site-36482-default-rtdb.firebaseio.com",
    projectId: "math-site-36482",
};

const app = initializeApp(firebaseConfig);

window.db = getDatabase(app);
window.auth = getAuth(app);
window.ref = ref;
window.push = push;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
</script>

</body>
</html>
