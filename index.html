<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оценка одноклассников</title>

<style>
body {
    font-family: Arial;
    background: #67d6c4;
    text-align: center;
}

.container {
    margin-top: 50px;
}

input {
    padding: 10px;
    margin: 10px;
    border: 2px solid black;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: #3e9c72;
    border: none;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>
<body>

<!-- РЕГИСТРАЦИЯ -->
<div id="auth" class="container">
    <h1>РЕГИСТРАЦИЯ</h1>

    <input id="email" placeholder="Почта"><br>
    <input id="password" type="password" placeholder="Пароль"><br>

    <button onclick="register()">Создать аккаунт</button><br><br>
    <button onclick="login()">Войти</button>
</div>

<!-- МЕНЮ -->
<div id="menu" class="container hidden">
    <h1>ОЦЕНКА ОДНОКЛАССНИКОВ</h1>

    <button onclick="startQuiz()">Оценить одноклассников</button><br><br>
    <button onclick="openChat()">Чат</button>
</div>

<!-- КВИЗ -->
<div id="quiz" class="container hidden"></div>

<script>

let currentUser = "";
let answers = {};

let students = [
"Мирослав","Ассовская","Грико","Гуща","Никола","Аня Д.","Артём"
];

function show(id) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");

    document.getElementById(id).classList.remove("hidden");
}

/* ===== РЕГИСТРАЦИЯ ===== */

function register() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    if (pass.length < 6) {
        alert("Пароль должен быть минимум 6 символов");
        return;
    }

    createUserWithEmailAndPassword(window.auth, email, pass)
    .then(() => {
        alert("Аккаунт создан!");
        currentUser = email;
        show("menu");
    })
    .catch(e => alert(e.message));
}

function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    if (!window.auth) {
    alert("Firebase не загрузился");
    return;
    }
    signInWithEmailAndPassword(window.auth, email, pass)
    .then(() => {
        alert("Вход выполнен!");
        currentUser = email;
        show("menu");
    })
    .catch(e => alert(e.message));
}
/* ===== КВИЗ ===== */

function startQuiz() {
    const div = document.getElementById("quiz");
    div.innerHTML = "<h2>Оцените одноклассников</h2>";

    students.forEach((s, i) => {
        div.innerHTML += `
        <div>
            ${s}: 
            <input type="number" min="0" max="10" onchange="save(${i}, this.value)">
        </div>`;
    });

    div.innerHTML += `<br><button onclick="submit()">Отправить</button>`;

    show("quiz");
}

function save(i, val) {
    answers[students[i]] = val;
}

function submit() {
    if (!window.db) {
    alert("Firebase не загрузился");
    return;
    }
    if (!currentUser) return alert("Сначала войдите!");

    push(ref(window.db, "results"), {
        user: currentUser,
        answers: answers
    });

    alert("Отправлено!");
}

/* ===== ЧАТ (пока заглушка) ===== */
function openChat() {
    alert("Чат пока не сделан 😄");
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBcbMg9i3KZfWzNUBe5DHwR4lCH4ySC9q8",
    authDomain: "math-site-36482.firebaseapp.com",
    databaseURL: "https://math-site-36482-default-rtdb.firebaseio.com",
    projectId: "math-site-36482",
};

const app = initializeApp(firebaseConfig);

window.db = getDatabase(app);
window.auth = getAuth(app);
window.ref = ref;
window.push = push;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
</script>

</body>
</html>
