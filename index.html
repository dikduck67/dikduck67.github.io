<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оценка одноклассников</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #67d6c4;
    font-family: 'Press Start 2P', cursive;
}

/* ОБЩИЙ КОНТЕЙНЕР */
#grid {
    max-height: 400px;
    overflow-y: auto;
    border: 4px solid black;
    padding: 10px;
}

.row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    align-items: center;
}

.row span {
    font-size: 10px;
}
.screen {
    width: 600px;
    margin: 60px auto;
    padding: 40px;
    border: 6px solid black;
    background: #67d6c4;
    position: relative;
}

/* ЗАГОЛОВОК */
.title {
    font-size: 22px;
    margin-bottom: 40px;
    text-align: center;
}

/* ИНПУТЫ */
.inputBox {
    margin: 20px 0;
    text-align: center;
}

input {
    width: 300px;
    height: 40px;
    border: 4px solid black;
    background: #67d6c4;
    font-family: 'Press Start 2P', cursive;
    text-align: center;
}

/* КНОПКИ */
.mainBtn {
    margin-top: 20px;
    padding: 15px 40px;
    font-size: 14px;
    background: #3e9c72;
    border: 4px solid black;
    cursor: pointer;
}

.mainBtn:hover {
    background: #2e7c52;
}

/* КНОПКА ПРОФИЛЯ */
.profileBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 50px;
    height: 50px;
    border: 4px solid black;
    background: #3e9c72;
    cursor: pointer;
}

/* ОКНО ПРОФИЛЯ */
.profileBox {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #67d6c4;
    border: 6px solid black;
    padding: 30px;
    width: 300px;
    text-align: center;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="auth" class="screen">
    <h1 class="title">LOGIN</h1>

    <div class="inputBox">
        <input id="nickname" placeholder="NICKNAME">
    </div>

    <div class="inputBox">
        <input id="password" type="password" placeholder="PASSWORD">
    </div>

    <button class="mainBtn" onclick="register()">REGISTER</button><br>
    <button class="mainBtn" onclick="login()">LOGIN</button>
</div>

<!-- МЕНЮ -->
<div id="menu" class="screen hidden">
    <button class="profileBtn" onclick="openProfile()">👤</button>

    <h1 class="title">MENU</h1>

    <button class="mainBtn" onclick="startQuiz()">START</button>
</div>

<!-- ПРОФИЛЬ -->
<div id="profile" class="profileBox hidden">
    <h2>PROFILE</h2>
    <p id="profileName"></p>
    <button class="mainBtn" onclick="closeProfile()">CLOSE</button>
</div>

<!-- КВИЗ -->
<div id="quiz" class="screen hidden"></div>

<script>
let currentUser = "";
let answers = {};

let students = [
"Мирослав","Ассовская","Грико","Гуща","Никола","Аня Д.","Артём", "Гриша","Серёжа","Максим","Иванова","Илья","Мирон","Косачёв", "Миша","Лебедев","Алекс","Мирошников","Аня М.","Андрей", "Полина","Лёша","Ира","Кира","Хмелёв","Саша","Щербаков"
];

function show(id) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");

    document.getElementById(id).classList.remove("hidden");
}

/* ПРОФИЛЬ */
function openProfile() {
    document.getElementById("profile").classList.remove("hidden");
    document.getElementById("profileName").innerText = "USER: " + currentUser;
}

function closeProfile() {
    document.getElementById("profile").classList.add("hidden");
}

/* РЕГИСТРАЦИЯ */
function register() {
    const nickname = document.getElementById("nickname").value;
    const pass = document.getElementById("password").value;

    if (pass.length < 6) return alert("Минимум 6 символов");

    const email = nickname + "@test.com";

    createUserWithEmailAndPassword(window.auth, email, pass)
    .then(() => {
        currentUser = nickname;
        show("menu");
    })
    .catch(e => alert(e.message));
}

/* ВХОД */
function login() {
    const nickname = document.getElementById("nickname").value;
    const pass = document.getElementById("password").value;

    const email = nickname + "@test.com";

    signInWithEmailAndPassword(window.auth, email, pass)
    .then(() => {
        currentUser = nickname;
        show("menu");
    })
    .catch(e => alert(e.message));
}

/* КВИЗ */
function startQuiz() {
    const div = document.getElementById("quiz");

    div.innerHTML = `
    <h2>RATE</h2>
    <div id="grid"></div>
    <br>
    <button class="mainBtn" onclick="submit()">SEND</button>
    `;

    const grid = document.getElementById("grid");

    students.forEach((s, i) => {
        grid.innerHTML += `
        <div class="row">
            <span>${s}</span>
            <input type="number" min="0" max="10" onchange="save(${i}, this.value)">
        </div>`;
    });

    show("quiz");
}
function save(i, val) {
    answers[students[i]] = val;
}

ffunction submit() {
    if (!window.db) return alert("Firebase не подключен");

    push(ref(window.db, "results"), {
        user: currentUser,
        answers: answers
    });

    alert("Отправлено!");

    // очистка ответов
    answers = {};

    // возврат в меню
    show("menu");
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBcbMg9i3KZfWzNUBe5DHwR4lCH4ySC9q8",
    authDomain: "math-site-36482.firebaseapp.com",
    databaseURL: "https://math-site-36482-default-rtdb.firebaseio.com",
    projectId: "math-site-36482",
};

const app = initializeApp(firebaseConfig);

window.db = getDatabase(app);
window.auth = getAuth(app);
window.ref = ref;
window.push = push;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
</script>

</body>
</html>
